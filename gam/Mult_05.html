<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Math Game Final</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
}

#startScreen {
    margin-top: 80px;
}

.bigBtn {
    padding: 15px 25px;
    font-size: 20px;
    margin: 10px;
    cursor: pointer;
    border: 2px solid #333;
    background: white;
    border-radius: 10px;
}

#rangeScreen {
    display: none;
    margin-top: 30px;
}

.rangeBtn {
    padding: 12px 18px;
    margin: 6px;
    font-size: 16px;
    cursor: pointer;
    border: 2px solid #333;
    background: white;
    border-radius: 8px;
}

#gameArea {
    width: 700px;
    height: 700px;
    margin: 15px auto;
    position: relative;
    border: 2px solid #333;
    background: white;
    overflow: hidden;
    display: none;
}

.question { font-size: 26px; }
#timer { font-size: 22px; color: red; }

.option {
    position: absolute;
    padding: 15px;
    border: 2px solid #333;
    border-radius: 8px;
    cursor: pointer;
    background: white;
}

#nextBtn {
    margin-top: 10px;
    padding: 10px 20px;
    display: none;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h1>🧠 Math Game</h1>

    <button class="bigBtn" onclick="selectMode('table')">🔢 Table Game</button>
    <button class="bigBtn" onclick="selectMode('square')">🔲 Square Game</button>
    <button class="bigBtn" onclick="selectMode('cube')">🔷 Cube Game</button>
</div>

<!-- RANGE -->
<div id="rangeScreen"></div>

<!-- GAME -->
<div class="question" id="question"></div>
<div id="timer">Time: 5</div>

<div id="gameArea"></div>

<div id="feedback"></div>
<button id="nextBtn">Next ➜</button>

<script>

let mode="";
let startRange=1;
let endRange=10;

let current=0;
let locked=false;
let timer;
let timeLeft=5;
let questions=[];

// ---------------- MODE ----------------
function selectMode(m){
    mode=m;
    document.getElementById("startScreen").style.display="none";
    document.getElementById("rangeScreen").style.display="block";

    renderRanges();
}

// ---------------- RANGE BUTTONS ----------------
function renderRanges(){
    let r=document.getElementById("rangeScreen");
    r.innerHTML="<h2>Select Range</h2>";

    let btns=[];

    if(mode==="table"){
        btns=[
            [1,10],[11,20],[21,30],[1,30]
        ];
    }

    if(mode==="square"){
        btns=[
            [1,10],[11,20],[1,25]
        ];
    }

    if(mode==="cube"){
        btns=[
            [1,10],[11,15],[1,15]
        ];
    }

    btns.forEach(b=>{
        let btn=document.createElement("button");
        btn.className="rangeBtn";

        if(b[0]===1 && b[1]===30 && mode==="table") btn.innerText="⭐ 1–30";
        else if(b[0]===1 && b[1]===25) btn.innerText="⭐ 1–25";
        else if(b[0]===1 && b[1]===30 && mode==="cube") btn.innerText="⭐ 1–30";
        else btn.innerText=`${b[0]}–${b[1]}`;

        btn.onclick=()=>setRange(b[0],b[1]);
        r.appendChild(btn);
    });
}

// ---------------- SET RANGE ----------------
function setRange(s,e){
    startRange=s;
    endRange=e;

    document.getElementById("rangeScreen").style.display="none";
    document.getElementById("gameArea").style.display="block";

    startGame();
}

// ---------------- QUESTIONS ----------------
function generateQuestions(){
    let nums=[];
    for(let i=startRange;i<=endRange;i++) nums.push(i);
    nums.sort(()=>Math.random()-0.5);

    return nums.slice(0,10).map(i=>{
        if(mode==="table") return {q:`${i} × 2`, ans:i*2};
        if(mode==="square") return {q:`${i}²`, ans:i*i};
        if(mode==="cube") return {q:`${i}³`, ans:i*i*i};
    });
}

// ---------------- START ----------------
function startGame(){
    questions=generateQuestions();
    current=0;
    loadQuestion();
}

// ---------------- TIMER ----------------
function startTimer(){
    timeLeft=5;
    document.getElementById("timer").innerText="Time: "+timeLeft;

    timer=setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").innerText="Time: "+timeLeft;

        if(timeLeft<=0){
            clearInterval(timer);
            if(!locked) timeUp();
        }
    },1000);
}

// ---------------- TIME UP ----------------
function timeUp(){
    locked=true;

    let correct=questions[current].ans;
    document.getElementById("feedback").innerText="⏱ Answer: "+correct;
    document.getElementById("nextBtn").style.display="inline-block";
}

// ---------------- LOAD ----------------
function loadQuestion(){
    locked=false;
    document.getElementById("feedback").innerText="";
    document.getElementById("nextBtn").style.display="none";

    let q=questions[current];
    document.getElementById("question").innerText=q.q;

    let correct=q.ans;

    let opts=new Set([correct]);

    while(opts.size<4){
        opts.add(correct+(Math.floor(Math.random()*20)-10));
    }

    let arr=[...opts];

    let area=document.getElementById("gameArea");
    area.innerHTML="";

    let pos=[
        {x:100,y:100},
        {x:500,y:100},
        {x:100,y:500},
        {x:500,y:500}
    ];

    arr.forEach((v,i)=>{
        let div=document.createElement("div");
        div.className="option";
        div.innerText=v;

        let p=pos[i];
        div.style.left=p.x+"px";
        div.style.top=p.y+"px";

        div.onclick=function(){
            if(locked) return;
            locked=true;

            clearInterval(timer);

            if(v===correct){
                div.style.background="#4CAF50";
                document.getElementById("feedback").innerText="✅ Correct!";
            }else{
                div.style.background="#f44336";
                document.getElementById("feedback").innerText="❌ Answer: "+correct;
            }

            document.getElementById("nextBtn").style.display="inline-block";
        };

        area.appendChild(div);
    });

    startTimer();
}

// ---------------- NEXT ----------------
document.getElementById("nextBtn").onclick=function(){
    current++;

    if(current>=questions.length){
        document.getElementById("question").innerText="🎉 Completed!";
        document.getElementById("gameArea").innerHTML="";
        return;
    }

    loadQuestion();
};

</script>

</body>
</html>
